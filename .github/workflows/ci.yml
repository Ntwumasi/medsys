name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: Typecheck, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      # Typecheck both workspaces
      - name: Typecheck server
        run: npx tsc --noEmit --project server/tsconfig.json
      - name: Typecheck client
        run: npx tsc --noEmit --project client/tsconfig.json

      # Build
      - name: Build server
        run: npm run build --workspace=server
      - name: Build client
        run: npm run build --workspace=client

      # Test (91 server tests + client tests, all < 1s)
      - name: Test server
        run: npm run test:run --workspace=server
      - name: Test client
        run: npm run test:run --workspace=client

      # Security audit (informational only)
      - name: Security audit
        run: npm audit --audit-level=high || true

  migrate-staging:
    name: Migrate Staging DB
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=server
      - name: Run pending migrations
        run: cd server && npx ts-node src/database/migrate.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  migrate-production:
    name: Migrate Production DB
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=server
      - name: Run pending migrations
        run: cd server && npx ts-node src/database/migrate.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
