name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm install --workspaces
      - run: cd server && npx tsc --noEmit
      - run: cd client && npx tsc --noEmit

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm install --workspaces
      - run: npm run build --workspace=server
      - run: npm run build --workspace=client
      - run: npm run test:run --workspace=server
      - run: npm run test:run --workspace=client

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm install --workspaces
      - name: Audit server dependencies
        run: cd server && npm audit --audit-level=high
        continue-on-error: true
      - name: Audit client dependencies
        run: cd client && npm audit --audit-level=high
        continue-on-error: true

  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [typecheck, build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm install --workspaces
      - run: npm run build --workspace=server
      - name: Run pending migrations
        run: cd server && npx ts-node src/database/migrate.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
